name: xalan1

on:
  push:
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cleanup old files
        run: |
          sudo rm -rf ./dacapobench
          sudo rm -rf /tmp/dacapobench

      - name: Prepare DaCapo
        run: |
          cp -r ~/Documentos/dacapobench /tmp/dacapobench
          sudo chown -R $USER:$USER /tmp/dacapobench
          cp -r /tmp/dacapobench ./dacapobench

      - name: Build Docker image
        run: |
          docker build \
            --no-cache \
            -f .github/workflows/Dockerfile \
            -t xalan-energy .

      - name: Run DaCapo Xalan benchmark
        run: |
          docker run --rm --privileged xalan-energy \
          java -jar /home/carlos/xalan/dacapobench/benchmarks/dacapo-evaluation-git-e947cbfc-dirty/launchers/xalan.jar \
          -s large xalan
